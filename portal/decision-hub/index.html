<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decision Hub / 決裁・承認 | IDEA NOV OS</title>
    <style>
      :root {
        --bg-primary: #ffffff;
        --bg-soft: #fafafa;
        --text-primary: #1f1f1f;
        --text-secondary: #767676;
        --color-bassa: #e8b4b8;
        --color-alert: #ff3b30;
        --border-light: #e5e5e5;
        --radius-md: 8px;
        --spacing-sm: 8px;
        --spacing-md: 12px;
        --spacing-lg: 16px;
        --spacing-xl: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg-soft);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
        font-size: 14px;
        line-height: 1.55;
      }

      .app-shell {
        max-width: 960px;
        min-height: 100vh;
        margin: 0 auto;
        background: var(--bg-primary);
        border-left: 1px solid var(--border-light);
        border-right: 1px solid var(--border-light);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: var(--spacing-lg);
        min-height: 64px;
        padding: 0 var(--spacing-lg);
        background: var(--bg-primary);
        border-bottom: 1px solid var(--border-light);
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 16px;
        font-weight: 500;
      }

      h2 {
        font-size: 15px;
        font-weight: 500;
      }

      .muted {
        color: var(--text-secondary);
        font-size: 13px;
      }

      main {
        padding: var(--spacing-lg);
        display: grid;
        gap: var(--spacing-lg);
      }

      .notice {
        display: grid;
        gap: 4px;
        padding: var(--spacing-md);
        border: 1px solid #ffd3cf;
        border-radius: var(--radius-md);
        background: #fff5f4;
        color: var(--text-primary);
      }

      .notice strong {
        color: var(--color-alert);
        font-weight: 500;
      }

      .tabs,
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: var(--spacing-sm);
      }

      button {
        min-height: 44px;
        border: 1px solid var(--border-light);
        border-radius: var(--radius-md);
        background: #ffffff;
        color: var(--text-primary);
        padding: 0 var(--spacing-lg);
        font: inherit;
        font-weight: 500;
      }

      button[disabled] {
        color: var(--text-secondary);
        cursor: not-allowed;
        background: #f6f6f6;
      }

      .panel {
        display: grid;
        gap: var(--spacing-md);
        padding: var(--spacing-lg);
        border: 1px solid var(--border-light);
        border-radius: var(--radius-md);
        background: #ffffff;
      }

      .request-list {
        display: grid;
        gap: var(--spacing-md);
      }

      .request-row {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr) 128px;
        gap: var(--spacing-md);
        align-items: center;
        padding: var(--spacing-md);
        border: 1px solid var(--border-light);
        border-radius: var(--radius-md);
        background: var(--bg-soft);
      }

      .status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        border-radius: var(--radius-md);
        padding: 0 var(--spacing-sm);
        background: #fff5f4;
        color: var(--color-alert);
        font-size: 12px;
        white-space: nowrap;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--spacing-md);
      }

      .summary-grid article {
        padding: var(--spacing-md);
        border: 1px solid var(--border-light);
        border-radius: var(--radius-md);
        background: var(--bg-soft);
      }

      .summary-grid strong {
        display: block;
        margin-top: 4px;
        font-size: 20px;
        font-weight: 500;
      }

      @media (max-width: 720px) {
        .app-shell {
          border: 0;
        }

        main {
          padding: var(--spacing-md);
        }

        .request-row,
        .summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <div class="muted">IDEA NOV OS</div>
          <h1>Decision Hub / 決裁・承認</h1>
        </div>
        <div class="muted">企画・契約申請</div>
      </header>

      <main>
        <section class="notice" aria-label="未接続状態">
          <strong>設計中 / DB未接続</strong>
          <span>現在は確認用画面です。本番申請はまだ送信されません。</span>
        </section>

        <nav class="tabs" aria-label="Decision Hub menu">
          <button type="button">申請一覧</button>
          <button type="button">新規申請</button>
          <button type="button">承認・確認待ち</button>
          <button type="button">通知Inbox</button>
        </nav>

        <section class="summary-grid" aria-label="状況サマリー">
          <article>
            <span class="muted">下書き</span>
            <strong>0</strong>
          </article>
          <article>
            <span class="muted">承認・確認待ち</span>
            <strong>0</strong>
          </article>
          <article>
            <span class="muted">差戻し</span>
            <strong>0</strong>
          </article>
        </section>

        <section class="panel" aria-labelledby="list-title">
          <h2 id="list-title">企画・契約申請</h2>
          <div class="request-list">
            <article class="request-row">
              <span class="status">確認用</span>
              <div>
                <div>夏季キャンペーン外部広告出稿</div>
                <div class="muted">申請名、状態、期限のみを表示。契約本文や見積詳細は表示しません。</div>
              </div>
              <div class="muted">2026-07-12</div>
            </article>
            <article class="request-row">
              <span class="status">確認用</span>
              <div>
                <div>新規取引先との業務委託契約</div>
                <div class="muted">添付URL、差戻し理由全文、機微情報は通知本文へ出しません。</div>
              </div>
              <div class="muted">2026-07-10</div>
            </article>
          </div>
          <div class="actions">
            <button type="button" disabled>申請</button>
            <button type="button" disabled>承認</button>
            <button type="button" disabled>差戻し</button>
            <button type="button" disabled>却下</button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
