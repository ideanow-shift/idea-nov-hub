<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>サンクスコイン | NOV HUB</title>
  <meta name="application-name" content="サンクスコイン">
  <meta name="apple-mobile-web-app-title" content="サンクスコイン">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/icon-192.png">
  <style>
    :root {
      --bg-primary: #ffffff;
      --text-primary: #1f1f1f;
      --text-secondary: #767676;
      --color-bassa: #e8b4b8;
      --color-alert: #ff3b30;
      --color-success: #34c759;
      --border-light: #e5e5e5;
      --radius-md: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    }

    .card {
      width: min(440px, 100%);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: #fff7f8;
      border: 1px solid #f1c9cd;
      display: grid;
      place-items: center;
      color: var(--color-bassa);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .02em;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.5;
    }

    p {
      margin: 8px 0 0;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.8;
    }

    .checks {
      display: grid;
      gap: 8px;
      margin: 20px 0;
    }

    .check-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      font-size: 14px;
    }

    .pill {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 4px 10px;
      background: #f6f6f6;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .pill.ok {
      background: #eefaf2;
      color: #197b3a;
    }

    .pill.ng {
      background: #fff2f2;
      color: var(--color-alert);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      padding: 12px 16px;
      border: 0;
      border-radius: var(--radius-md);
      background: var(--color-bassa);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    .button.secondary {
      margin-top: 8px;
      background: #fff;
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">NOV</span>
      <div>
        <h1>サンクスコイン</h1>
        <p id="status">NOV HUBのログイン情報と権限を確認しています。</p>
      </div>
    </div>

    <div class="checks" aria-live="polite">
      <div class="check-row">
        <span>HUBログイン情報</span>
        <span class="pill" id="context-status">確認中</span>
      </div>
      <div class="check-row">
        <span>社員ID</span>
        <span class="pill" id="employee-status">確認中</span>
      </div>
      <div class="check-row">
        <span>IDEA LINK権限</span>
        <span class="pill" id="role-status">確認中</span>
      </div>
    </div>

    <a id="openLink" class="button" href="#">サンクスコインを開く</a>
    <a class="button secondary" href="../">NOV HUBへ戻る</a>
  </main>

  <script type="module">
    import {
      HUB_CONTEXT_QUERY_KEY,
      encodeHubContextForUrl,
      readHubEmployeeContext,
      readHubEmployeeContextFromUrl
    } from "../js/hub-context.js";

    const IDEA_LINK_GAS_URL = "https://script.google.com/a/macros/idea-nov.com/s/AKfycbz3tmMUSvKEVZgmf8w-pKLk_H6_fXdltkwrHF5VIfpItufu41xoCa1f3-1aE0w3fJpucw/exec";
    const IDEA_LINK_ROLE_KEYS = ["idea_link.staff", "idea_link.manager", "idea_link.admin"];

    const status = document.querySelector("#status");
    const openLink = document.querySelector("#openLink");
    const contextStatus = document.querySelector("#context-status");
    const employeeStatus = document.querySelector("#employee-status");
    const roleStatus = document.querySelector("#role-status");

    function setPill(element, ok, label) {
      element.textContent = label;
      element.classList.remove("ok", "ng");
      element.classList.add(ok ? "ok" : "ng");
    }

    function getRoleKeys(context) {
      const roleKeys = new Set(Array.isArray(context?.roleKeys) ? context.roleKeys : []);
      if (Array.isArray(context?.roles)) {
        context.roles.forEach((role) => {
          if (role?.roleKey) roleKeys.add(role.roleKey);
        });
      }
      return roleKeys;
    }

    function buildIdeaLinkUrl(context) {
      const incoming = new URL(window.location.href).searchParams.get(HUB_CONTEXT_QUERY_KEY);
      const encoded = incoming || encodeHubContextForUrl(context);
      const url = new URL(IDEA_LINK_GAS_URL);
      if (encoded) url.searchParams.set(HUB_CONTEXT_QUERY_KEY, encoded);
      return { url: url.toString(), encoded };
    }

    function isStandaloneLaunch() {
      return window.navigator.standalone === true ||
        window.matchMedia?.("(display-mode: standalone)")?.matches === true;
    }

    const context = readHubEmployeeContextFromUrl(window.location.href) || readHubEmployeeContext();
    const hasContext = Boolean(context);
    const hasEmployeeId = Boolean(context?.id || context?.employeeId || context?.supabaseEmployeeId);
    const roleKeys = getRoleKeys(context);
    const hasIdeaLinkRole = IDEA_LINK_ROLE_KEYS.some((roleKey) => roleKeys.has(roleKey));

    setPill(contextStatus, hasContext, hasContext ? "あり" : "なし");
    setPill(employeeStatus, hasEmployeeId, hasEmployeeId ? "確認済み" : "なし");
    setPill(roleStatus, hasIdeaLinkRole, hasIdeaLinkRole ? "利用可" : "権限なし");

    if (!hasContext || !hasEmployeeId) {
      status.textContent = "HUBログイン情報が見つかりません。NOV HUBへ戻ってログイン後、もう一度IDEA LINKを開いてください。";
      openLink.hidden = true;
    } else if (!hasIdeaLinkRole) {
      status.textContent = "このアカウントにはIDEA LINKの利用権限がありません。マスタ管理でIDEA LINK権限を確認してください。";
      openLink.hidden = true;
    } else {
      const result = buildIdeaLinkUrl(context);
      openLink.href = result.url;
      status.textContent = "確認できました。ホーム画面に追加する場合は、このページを追加してください。";
      if (isStandaloneLaunch()) {
        status.textContent = "確認できました。サンクスコインへ移動します。";
        window.setTimeout(() => {
          window.location.replace(result.url);
        }, 600);
      }
    }
  </script>
</body>
</html>
