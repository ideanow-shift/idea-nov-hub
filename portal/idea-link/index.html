<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDEA LINK | NOV HUB</title>
  <meta name="application-name" content="IDEA LINK">
  <meta name="apple-mobile-web-app-title" content="IDEA LINK">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/icon-192.png">
  <style>
    :root {
      --bg: #ffffff;
      --panel: #fff8f9;
      --text: #1f1f1f;
      --muted: #6f6f76;
      --brand: #e8b4b8;
      --border: #ead5d8;
      --danger: #c03434;
      --ok: #197b3a;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 20px;
    }

    .header-inner {
      width: min(960px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--brand);
      font-weight: 700;
      font-size: 12px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    main {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .status {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      background: var(--panel);
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .status.ok {
      color: var(--ok);
      background: #f4fbf6;
      border-color: #cdebd5;
    }

    .status.ng {
      color: var(--danger);
      background: #fff6f6;
      border-color: #f1caca;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 20px 0 12px;
      flex-wrap: wrap;
    }

    .summary {
      color: var(--muted);
      font-size: 13px;
    }

    button,
    .button {
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 9px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    button.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    .timeline {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .post {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      background: #fff;
    }

    .post-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .post-title {
      margin: 8px 0;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
    }

    .post-body {
      margin: 0;
      color: #333;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 16px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <span class="mark" aria-hidden="true">NOV</span>
        <div>
          <h1>IDEA LINK</h1>
          <p class="sub">Core DB / NOV HUB API で表示します。</p>
        </div>
      </div>
      <a class="button" href="../">NOV HUBへ戻る</a>
    </div>
  </header>

  <main>
    <div id="status" class="status">HUBログイン情報とIDEA LINK権限を確認しています。</div>

    <div class="toolbar">
      <div id="summary" class="summary">読み込み前</div>
      <button id="reload" class="primary" type="button">再読み込み</button>
    </div>

    <section id="timeline" class="timeline" aria-live="polite"></section>
  </main>

  <script type="module">
    import { callApiAction } from "../js/api.js";
    import {
      readHubEmployeeContext,
      readHubEmployeeContextFromUrl
    } from "../js/hub-context.js";

    const IDEA_LINK_ROLE_KEYS = ["idea_link.staff", "idea_link.manager", "idea_link.admin"];
    const statusEl = document.querySelector("#status");
    const summaryEl = document.querySelector("#summary");
    const timelineEl = document.querySelector("#timeline");
    const reloadButton = document.querySelector("#reload");

    function setStatus(kind, message) {
      statusEl.classList.remove("ok", "ng");
      if (kind) statusEl.classList.add(kind);
      statusEl.textContent = message;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getRoleKeys(context) {
      const roleKeys = new Set(Array.isArray(context?.roleKeys) ? context.roleKeys.map(String) : []);
      if (Array.isArray(context?.roles)) {
        context.roles.forEach((role) => {
          if (typeof role === "string") roleKeys.add(role);
          else if (role?.roleKey) roleKeys.add(String(role.roleKey));
        });
      }
      return roleKeys;
    }

    function formatDateTime(value) {
      const date = new Date(value || "");
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("ja-JP", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function renderTimeline(items) {
      if (!items.length) {
        timelineEl.innerHTML = '<div class="empty">表示できる投稿はまだありません。</div>';
        return;
      }
      timelineEl.innerHTML = items.map((item) => {
        const sender = item.sender_name_snapshot || "送信者";
        const receiver = item.receiver_name_snapshot || item.receiver_store_name_snapshot || "宛先";
        const title = `${sender} → ${receiver}`;
        const badges = [
          item.category,
          item.challenge_flag ? "チャレンジ" : "",
          item.visibility === "private" ? "限定" : "公開"
        ].filter(Boolean).join(" / ");
        return `
          <article class="post">
            <div class="post-meta">
              <span>${escapeHtml(formatDateTime(item.created_at))}</span>
              <span>${escapeHtml(badges)}</span>
            </div>
            <h2 class="post-title">${escapeHtml(title)}</h2>
            <p class="post-body">${escapeHtml(item.comment)}</p>
          </article>
        `;
      }).join("");
    }

    function ensureContext() {
      const context = readHubEmployeeContextFromUrl(window.location.href) || readHubEmployeeContext();
      const hasEmployeeId = Boolean(context?.id || context?.employeeId || context?.supabaseEmployeeId);
      const roleKeys = getRoleKeys(context);
      const hasIdeaLinkRole = IDEA_LINK_ROLE_KEYS.some((roleKey) => roleKeys.has(roleKey));
      return { context, hasEmployeeId, hasIdeaLinkRole };
    }

    async function loadTimeline() {
      const { context, hasEmployeeId, hasIdeaLinkRole } = ensureContext();
      timelineEl.innerHTML = "";
      summaryEl.textContent = "確認中";

      if (!context || !hasEmployeeId) {
        setStatus("ng", "HUBログイン情報が見つかりません。NOV HUBへ戻ってログインしてください。");
        summaryEl.textContent = "ログイン情報なし";
        return;
      }
      if (!hasIdeaLinkRole) {
        setStatus("ng", "このアカウントにはIDEA LINKの利用権限がありません。");
        summaryEl.textContent = "権限なし";
        return;
      }

      reloadButton.disabled = true;
      setStatus("", "IDEA LINKタイムラインを読み込んでいます。");
      try {
        const response = await callApiAction("ideaLinkTimelineRead", { limit: 30 });
        const timeline = response.timeline || {};
        const items = Array.isArray(timeline.items) ? timeline.items : [];
        renderTimeline(items);
        setStatus("ok", "NOV HUB APIから読み込みました。");
        summaryEl.textContent = `${items.length}件 / source: ${timeline.source || "nov-hub-api"}`;
      } catch (error) {
        setStatus("ng", error?.message || "IDEA LINKの読み込みに失敗しました。");
        summaryEl.textContent = error?.code || "読み込み失敗";
        timelineEl.innerHTML = '<div class="empty">NOV HUBへ戻って再ログイン後、もう一度開いてください。</div>';
      } finally {
        reloadButton.disabled = false;
      }
    }

    reloadButton.addEventListener("click", loadTimeline);
    loadTimeline();
  </script>
</body>
</html>
