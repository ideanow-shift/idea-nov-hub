<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HUB Context Test | NOV HUB</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="test-header">
    <div class="brand">
      <img class="brand-logo" src="../assets/ideanov-logo-pink.png" alt="IDEA NOV">
      <div>
        <h1>HUB Context Test</h1>
        <p>NOV HUBから渡されるログイン情報の確認画面</p>
      </div>
    </div>
    <a class="button button-secondary" href="../">HUBへ戻る</a>
  </header>

  <main class="test-main">
    <section id="status-card" class="status-card" aria-live="polite">
      <div class="status-mark" id="status-mark">...</div>
      <div>
        <p class="eyebrow">Context Status</p>
        <h2 id="status-title">確認中です</h2>
        <p id="status-message">HUB Contextを読み込んでいます。</p>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title-row">
        <h2>社員情報</h2>
        <span id="source-badge" class="badge">未取得</span>
      </div>
      <dl class="data-list" id="employee-list"></dl>
    </section>

    <section class="panel">
      <div class="panel-title-row">
        <h2>role_keys</h2>
        <span id="role-count" class="badge">0</span>
      </div>
      <div id="role-chips" class="chip-list"></div>
    </section>

    <section class="panel">
      <h2>IDEA LINK 判定</h2>
      <div id="idea-link-status" class="permission-grid"></div>
    </section>

    <section class="panel">
      <h2>受け取り経路</h2>
      <dl class="data-list" id="diagnostic-list"></dl>
    </section>

    <section class="panel">
      <div class="panel-title-row">
        <h2>安全なJSON確認</h2>
        <button id="copy-json" class="button button-secondary" type="button">JSONをコピー</button>
      </div>
      <pre id="raw-json" class="json-box">{}</pre>
    </section>

    <div class="action-row">
      <button id="reload-context" class="button button-primary" type="button">再読み込み</button>
      <button id="clear-context" class="button button-secondary" type="button">保存Contextをクリア</button>
      <a class="button button-secondary" href="../docs/nov-hub-app-context.md">仕様書を開く</a>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
