<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDEA LINKへ移動中 | NOV HUB</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --text-primary: #1f1f1f;
      --text-secondary: #767676;
      --color-bassa: #e8b4b8;
      --border-light: #e5e5e5;
      --radius-md: 8px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    }

    .card {
      width: min(440px, calc(100vw - 32px));
      border: 1px solid var(--border-light);
      border-radius: 14px;
      padding: 28px;
      box-sizing: border-box;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: #fff7f8;
      border: 1px solid #f1c9cd;
      display: grid;
      place-items: center;
    }

    .brand-mark svg {
      width: 22px;
      height: 22px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
    }

    p {
      margin: 10px 0 0;
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.8;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      margin-top: 20px;
      padding: 0 18px;
      border-radius: var(--radius-md);
      background: var(--color-bassa);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    .error {
      color: #ff3b30;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7.5 12.5 10.5 15.5 16.8 8.5" stroke="#e8b4b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="3" y="3" width="18" height="18" rx="6" stroke="#e8b4b8" stroke-width="1.8"/>
        </svg>
      </span>
      <div>
        <h1>IDEA LINKへ移動中</h1>
        <p>NOV HUBのログイン情報を引き継いでいます。</p>
      </div>
    </div>
    <p id="status">自動で移動しない場合は、下のボタンを押してください。</p>
    <a id="openLink" class="button" href="#">IDEA LINKを開く</a>
  </main>

  <script type="module">
    import {
      HUB_CONTEXT_QUERY_KEY,
      encodeHubContextForUrl,
      readHubEmployeeContext,
      readHubEmployeeContextFromUrl
    } from "../js/hub-context.js";

    const IDEA_LINK_GAS_URL = "https://script.google.com/a/macros/idea-nov.com/s/AKfycbz3tmMUSvKEVZgmf8w-pKLk_H6_fXdltkwrHF5VIfpItufu41xoCa1f3-1aE0w3fJpucw/exec";
    const status = document.querySelector("#status");
    const openLink = document.querySelector("#openLink");

    function buildIdeaLinkUrl() {
      const incoming = new URL(window.location.href).searchParams.get(HUB_CONTEXT_QUERY_KEY);
      const context = readHubEmployeeContextFromUrl(window.location.href) || readHubEmployeeContext();
      const encoded = incoming || encodeHubContextForUrl(context);
      const url = new URL(IDEA_LINK_GAS_URL);
      if (encoded) url.searchParams.set(HUB_CONTEXT_QUERY_KEY, encoded);
      return { url: url.toString(), hasContext: Boolean(encoded) };
    }

    const result = buildIdeaLinkUrl();
    openLink.href = result.url;

    if (!result.hasContext) {
      status.innerHTML = '<span class="error">HUBログイン情報が見つかりません。</span><br>NOV HUBへ戻ってログイン後、もう一度IDEA LINKを開いてください。';
    } else {
      window.location.replace(result.url);
    }
  </script>
</body>
</html>
